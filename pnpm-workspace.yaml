# PLEASE UPDATE THE PACKAGES LIST APPROPRIATELY.
packages:
  - "docs"
  - "frontend"
  - "packages/*"

engineStrict: true
minimumReleaseAge: 2880
nodeOptions: "${NODE_OPTIONS:- } --experimental-vm-modules"
trustPolicy: no-downgrade
trustPolicyExclude:
  - "chokidar@4.0.3"
  - "eslint-import-resolver-typescript@3.10.1"
  - "rollup@2.80.0"
  - "semver@6.3.1"
blockExoticSubdeps: true
ignoreDepScripts: true

overrides:
  collect-v8-coverage: "^1.0.3"
  fast-xml-parser: "^5.5.6"
  flatted: "^3.4.0"
  pretty-format>react-is: "19.0.0"
  react: "19.2.0"
  react-dom: "19.2.0"
  ts-jest>handlebars: "^4.7.9"

catalogs:
  lint:
    "@eslint/eslintrc": "^3.3.5"
    "@eslint/js": "^9.39.4"
    "@next/eslint-plugin-next": "^15.3.2"
    "@stylistic/eslint-plugin": "^5.10.0"
    "@typescript-eslint/parser": "^8.57.2"
    eslint: "^9.39.3"
    eslint-config-airbnb-extended: "^3.0.1"
    eslint-config-prettier: "^10.1.8"
    eslint-import-resolver-typescript: "^4.4.4"
    eslint-plugin-html: "^8.1.4"
    eslint-plugin-import-x: "^4.16.2"
    eslint-plugin-jest: "^29.15.1"
    eslint-plugin-json: "^4.0.1"
    eslint-plugin-jsx-a11y: "^6.10.2"
    eslint-plugin-no-relative-import-paths: "^1.6.1"
    eslint-plugin-prettier: "^5.5.5"
    eslint-plugin-react: "^7.37.5"
    eslint-plugin-security: "^4.0.0"
    eslint-plugin-sonarjs: "^4.0.2"
    eslint-plugin-sort-destructure-keys: "^3.0.0"
    eslint-plugin-unicorn: "^63.0.0"
    typescript-eslint: "^8.57.2"
  test:
    "@types/jest": "^30.0.0"
    jest: "^30.1.3"
    jest-environment-jsdom: "^30.1.2"
    jest-html-reporter: "^4.3.0"
    jest-mock-extended: "^4.0.0"
    lcov-result-merger: "^5.0.1"
    ts-jest: "^29.4.0"
  tools:
    "@tsconfig/node22": "^22.0.5"
    "@types/aws-lambda": "^8.10.161"
    "@types/node": "^24.12.0"
    esbuild: "^0.27.4"
    ts-node: "^10.9.2"
    tsx: "^4.21.0"
    typescript: "^5.9.3"
  frontend:
    "@aws-amplify/adapter-nextjs": "^1.6.9"
    "@testing-library/dom": "^10.4.0"
    "@testing-library/jest-dom": "^6.6.3"
    "@testing-library/react": "^16.2.0"
    "@testing-library/user-event": "^14.6.1"
    "@types/react": "19.0.8"
    "@types/react-dom": "19.0.3"
    aws-amplify: "^6.15.6"
    eslint-config-next: "^15.5.14"
    next: "^15.5.14"
    react: "19.2.0"
    react-dom: "19.2.0"
    sass: "^1.86.0"
  docs:
    nhsuk-frontend: "^8.1.1"
  schema:
    "@asyncapi/bundler": "^0.6.4"
    "@stoplight/spectral-cli": "^6.15.1"
    zod: "4.1.12"
  build:
    "@swc/core": "^1.13.5"
    "@swc/jest": "^0.2.37"
